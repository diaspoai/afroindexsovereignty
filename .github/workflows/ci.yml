name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      IAFS_CURRENT_YEAR: "2026"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        # Using `npm install` (not `npm ci`) to work around npm/cli#4828:
        # macOS-generated package-lock.json doesn't list optional native
        # rollup binaries needed on Linux. `npm install` resolves them at
        # install time on the target platform.
        run: npm install --no-audit --no-fund

      - name: validate (schema + cross-record)
        run: npm run validate

      - name: normalize (verify stored axis_scores match recomputed)
        run: npm run normalize

      - name: evals (01–08)
        run: npm run test

      - name: forbid-composite (defense in depth)
        run: npm run lint:composite

      - name: build site
        run: npm run build

      - name: install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E + a11y
        run: npm run e2e
