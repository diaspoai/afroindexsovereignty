name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      IAFS_CURRENT_YEAR: "2026"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        # Working around npm/cli#4828: a package-lock.json generated on
        # macOS does not record platform-specific optional native binaries
        # (e.g. @rollup/rollup-linux-x64-gnu) that Linux needs. Removing
        # the lockfile forces npm to re-resolve them fresh on Linux.
        # Local dev keeps the lockfile for reproducibility; CI regenerates.
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund

      - name: validate (schema + cross-record)
        run: npm run validate

      - name: normalize (verify stored axis_scores match recomputed)
        run: npm run normalize

      - name: evals (01–08)
        run: npm run test

      - name: forbid-composite (defense in depth)
        run: npm run lint:composite

      - name: build site
        run: npm run build

      - name: install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E + a11y
        run: npm run e2e
